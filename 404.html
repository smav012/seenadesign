    <style>
        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .error-wrap {
            padding: 2rem;
            max-width: 480px;
            width: 100%;
        }
        .error-code {
            font-size: 7rem;
            font-weight: 700;
            line-height: 1;
            color: var(--yellow, #FFF800);
            margin: 0 0 0.25rem;
            letter-spacing: -0.03em;
        }
        .error-msg {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.55);
            margin: 0 0 2rem;
        }
        .error-links {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .error-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.15s;
        }
        .error-links a:hover {
            color: var(--yellow, #FFF800);
            text-decoration: underline;
        }
    </style>
