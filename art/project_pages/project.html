<html lang="en">

  <!-- JSON-LD -->
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Person","name":"Seena Mavaddat","url":"https://seena.design","sameAs":["https://instagram.com/seena.d2a","https://seena.design/art/"]}</script>

  <title>seena — art</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../img/favicon_art.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../../img/slogo_ios.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Imbue:opsz,wght@10..100,100..900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'TypestarOCR';
      src: url('../../fonts/Typestar-OCR.otf') format('opentype');
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #3f3f9b;
      color: rgba(240,236,224,.85);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Blob background */
    .bg-blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(90px); }
    .blob-1 { width: 60vw; height: 60vw; background: rgba(51,133,234,.591); top: -15%; left: -20%; animation: drift-1 18s ease-in-out infinite alternate; }
    .blob-2 { width: 50vw; height: 50vw; background: rgba(251,146,60,.28); top: 25%; right: -15%; animation: drift-2 22s ease-in-out infinite alternate; }
    .blob-3 { width: 45vw; height: 45vw; background: rgba(248,125,252,.22); bottom: -10%; left: 15%; animation: drift-3 16s ease-in-out infinite alternate; }
    .blob-4 { width: 35vw; height: 35vw; background: rgba(47,211,38,.46); top: 50%; left: -5%; animation: drift-4 24s ease-in-out infinite alternate; }
    @keyframes drift-1 { from { transform: translate(0,0) scale(1); } to { transform: translate(8vw,6vh) scale(1.1); } }
    @keyframes drift-2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-6vw,-8vh) scale(.95); } }
    @keyframes drift-3 { from { transform: translate(0,0) scale(1); } to { transform: translate(5vw,-5vh) scale(1.08); } }
    @keyframes drift-4 { from { transform: translate(0,0) scale(1); } to { transform: translate(7vw,4vh) scale(1.05); } }

    /* Scroll-triggered sticky slogo */
    .logo-sticky {
      position: fixed; top: 18px; left: 3vw;
      z-index: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .logo-sticky.visible { opacity: 1; pointer-events: all; }
    .logo-sticky a { display: block; }
    .logo-sticky img { width: 100px; display: block; }

    /* Page wrapper */
    .proj-page {
      position: relative; z-index: 1;
      width: 90%; margin: 0 auto;
      padding: 32px 0 80px;
      display: grid;
      grid-template-columns: 1fr 36%;
      column-gap: 48px;
      align-items: start;
    }

    /* Logo header — spans full width, row 1 */
    .proj-logo-header {
      grid-column: 1 / -1;
      grid-row: 1;
      padding: 0 0 32px;
    }
    .proj-logo-header a { display: inline-block; }
    .proj-logo-header img { width: clamp(160px, 34vw, 364px); display: block; }

    /* Left column: images, row 2 */
    .proj-images {
      grid-column: 1;
      grid-row: 2;
      display: flex; flex-direction: column; gap: 14px;
    }
    .proj-images.proj-images-masonry {
      position: relative; display: block;
    }
    .proj-images img {
      display: block; max-width: 88%; width: auto; height: auto;
      margin: 0 auto; border-radius: 6px;
      cursor: zoom-in; transition: opacity .2s;
    }
    .proj-images img:hover { opacity: .88; }
    .proj-video { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; }

    /* Right column: title, meta, desc, nav — row 2 */
    .proj-right {
      grid-column: 2;
      grid-row: 2;
      display: flex; flex-direction: column; gap: 24px;
    }

    .proj-title-text {
      font-family: 'Imbue', Georgia, serif; font-weight: 600;
      font-size: clamp(36px, 4.5vw, 64px); color: #f0ecff;
      line-height: 1.05; letter-spacing: -.02em;
    }
    .proj-subtitle-text {
      font-family: 'Imbue', Georgia, serif; font-weight: 500;
      font-size: clamp(22px, 2.8vw, 40px); color: rgba(240,236,255,.7);
      line-height: 1.1; margin-top: -12px;
    }
    .proj-meta-text {
      font-family: 'TypestarOCR', monospace; font-size: 14px;
      letter-spacing: .06em; color: rgba(240,236,224,.4);
      margin-top: -8px;
    }
    .proj-desc-text { font-size: 17px; line-height: 1.8; color: rgba(240,236,224,.82); }
    .proj-desc-text a { color: #c4a0ff; text-decoration: underline; text-underline-offset: 2px; }
    .proj-desc-text a:hover { color: #e0c4ff; }
    .proj-desc-text blockquote { border-left: 3px solid rgba(200,160,255,.3); margin: 12px 0; padding-left: 14px; color: rgba(240,236,224,.6); }
    .proj-desc-text p { margin-bottom: 1.2em; }
    .proj-desc-text p:last-child { margin-bottom: 0; }

    /* Prev/next nav */
    .proj-footer-nav {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .proj-nav-link {
      font-family: 'TypestarOCR', monospace; font-size: .88rem;
      letter-spacing: .04em; color: rgba(240,236,224,.45);
      text-decoration: none; transition: color .2s;
      max-width: 48%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .proj-nav-link:hover { color: #f0ecff; }
    .proj-nav-link.hidden { visibility: hidden; pointer-events: none; }
    .proj-footer-hint {
      font-family: 'TypestarOCR', monospace; font-size: .6rem;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(240,236,224,.35); user-select: none;
    }

    /* Badge */
    .badge-link { position: fixed; bottom: 20px; left: 20px; z-index: 700; }
    .badge-wrap { animation: badge-float 3.2s ease-in-out infinite; }
    .badge-wrap img { width: 88px; display: block; animation: badge-spin 20s linear infinite; }
    @keyframes badge-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes badge-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,.95); z-index: 2000; opacity: 0; transition: opacity .3s ease; align-items: center; justify-content: center; }
    .lightbox.active { display: flex; opacity: 1; }
    .lightbox-content { position: relative; max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; }
    .lightbox-image { max-width: 100%; max-height: 80vh; object-fit: contain; display: block; }
    .lightbox-hint { color: #666; font-family: 'TypestarOCR', monospace; font-size: .7rem; letter-spacing: 1px; text-align: center; margin-top: 12px; opacity: .6; }
    .lightbox-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 2rem; line-height: 1; cursor: pointer; opacity: .25; transition: opacity .3s; padding: 8px; z-index: 2100; }
    .lightbox-close:hover { opacity: .85; }
    .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: #fff; font-size: 3rem; cursor: pointer; opacity: .25; transition: opacity .3s; padding: 20px; z-index: 2100; }
    .lightbox-nav:hover { opacity: .8; }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.8); padding: 15px; z-index: 2100; justify-content: space-between; gap: 10px; }
    .lightbox-bottom-prev, .lightbox-bottom-next { flex: 1; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff; font-family: 'TypestarOCR', monospace; font-size: 1rem; padding: 12px 20px; border-radius: 6px; cursor: pointer; transition: background .3s; }
    .lightbox-bottom-prev:hover, .lightbox-bottom-next:hover { background: rgba(157,94,209,.3); }

    /* Not found */
    .proj-not-found { grid-column: 1 / -1; padding: 80px 40px; font-family: 'TypestarOCR', monospace; color: rgba(240,236,224,.4); }

    /* Mobile */
    @media (max-width: 700px) {
      .logo-sticky { top: auto; bottom: 20px; left: auto; right: 20px; }
      .logo-sticky img { width: 56px; }
      .proj-page { display: flex; flex-direction: column; padding: 20px 0 80px; }
      .proj-logo-header { order: 0; padding: 12px 0 20px; }
      .proj-logo-header img {
        content: url('../img/slogo_new_purple.png');
        width: clamp(52px, 14vw, 72px);
      }
      .proj-right { order: 1; }
      .proj-images { order: 2; padding-top: 28px; }
      .proj-images img { width: 100%; max-width: 100%; height: auto; margin: 0 auto; }
      .proj-title-text { font-size: clamp(36px, 9vw, 56px); }
      .proj-meta-text { font-size: 15px; }
      .proj-desc-text { font-size: 17px; }
      .proj-footer-hint { display: none; }
.lightbox-nav { display: none; }
      .lightbox-bottom-nav { display: flex; }
    }
  </style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <!-- Scroll-triggered sticky slogo -->
  <div class="logo-sticky" id="logoSticky">
    <a href="../index.html">
      <img src="../img/slogo_new_purple.png" alt="seena">
    </a>
  </div>

  <div class="proj-page" id="projPage">

    <!-- Graf logo — spans both columns, triggers sticky on scroll-off -->
    <div class="proj-logo-header" id="projLogoEl">
      <a href="../index.html">
        <img src="../img/seenalogo_graf new purple.png" alt="seena">
      </a>
    </div>

    <!-- Right column first in DOM → appears first on mobile -->
    <div class="proj-right">
      <div class="proj-title-text" id="projTitle"></div>
      <div class="proj-subtitle-text" id="projSubtitle" style="display:none"></div>
      <div class="proj-meta-text" id="projInfo"></div>
      <div class="proj-desc-text" id="projDesc"></div>
      <div class="proj-footer-nav">
        <a class="proj-nav-link hidden" id="projPrev" href="#">← last project</a>
        <a class="proj-nav-link hidden" id="projNext" href="#">next project →</a>
      </div>
      <div class="proj-footer-hint">click image to zoom &nbsp;&middot;&nbsp; esc close</div>
    </div>

    <!-- Left column: images — appears second on mobile (below text) -->
    <div id="projImages" class="proj-images"></div>

  </div>

  <a href="https://seena.design" class="badge-link" title="seena.design">
    <div class="badge-wrap">
      <img src="../img/designbutton.png" alt="seena.design">
    </div>
  </a>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
    <button class="lightbox-close" id="lightboxClose">&#215;</button>
    <div class="lightbox-content">
      <img class="lightbox-image" id="lightboxImage" src="" alt="">
      <div class="lightbox-hint">&#8592; &#8594; navigate &nbsp;&middot;&nbsp; esc close</div>
      <div class="lightbox-bottom-nav">
        <button class="lightbox-bottom-prev" id="lightboxBotPrev">&#8592; Previous</button>
        <button class="lightbox-bottom-next" id="lightboxBotNext">Next &#8594;</button>
      </div>
    </div>
  </div>

  <script src="../projects.js"></script>
  <script>
    /* ── Sticky slogo on scroll ── */
    var projLogoEl   = document.getElementById('projLogoEl');
    var logoStickyEl = document.getElementById('logoSticky');
    window.addEventListener('scroll', function() {
      if (projLogoEl.getBoundingClientRect().bottom < 0) {
        logoStickyEl.classList.add('visible');
      } else {
        logoStickyEl.classList.remove('visible');
      }
    }, { passive: true });

    /* ── Load project ── */
    var params  = new URLSearchParams(window.location.search);
    var id      = params.get('id');
    var project = PROJECTS.find(function(p) { return p.id === id; });

    if (!project) {
      document.getElementById('projPage').innerHTML =
        '<div class="proj-not-found">project not found.</div>';
    } else {
      document.title = 'seena — ' + project.title;
      var ogTitle = 'seena — ' + project.title;
      document.querySelector('meta[property="og:title"]').setAttribute('content', ogTitle);
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', ogTitle);
      if (project.thumb) {
        var ogImg = 'https://seena.design/art/' + project.thumb;
        document.querySelector('meta[property="og:image"]').setAttribute('content', ogImg);
        document.querySelector('meta[name="twitter:image"]').setAttribute('content', ogImg);
      }
      document.getElementById('projTitle').textContent = project.title;

      if (project.subtitle) {
        var subEl = document.getElementById('projSubtitle');
        subEl.textContent = project.subtitle;
        subEl.style.display = '';
      }

      var meta = [project.year, project.medium].filter(Boolean).join(' · ');
      document.getElementById('projInfo').textContent = meta;

      if (project.description) {
        document.getElementById('projDesc').innerHTML = project.description;
      }

      /* Images */
      var imagesEl = document.getElementById('projImages');
      var projectLbImages = project.images.map(function(src) {
        return { src: '../' + src, alt: project.title };
      });

      function makeEmbed(src) {
        var fr = document.createElement('iframe');
        fr.src = src;
        fr.className = 'proj-video';
        fr.title = 'YouTube video player';
        fr.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        fr.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
        fr.setAttribute('allowfullscreen', '');
        return fr;
      }

      if (project.video) {
        imagesEl.appendChild(makeEmbed(project.video));
      }

      var isMasonry = project.layout === 'grid';
      project.images.forEach(function(src, i) {
        var img = document.createElement('img');
        img.src = '../' + src; img.alt = project.title;
        if (!isMasonry) img.loading = 'lazy';
        img.addEventListener('click', (function(idx) {
          return function() { openLightbox(projectLbImages, idx); };
        })(i));
        imagesEl.appendChild(img);
      });

      if (project.videoAfter) {
        imagesEl.appendChild(makeEmbed(project.videoAfter));
      }

      /* JS masonry for grid-layout projects */
      if (isMasonry) {
        var masonryImgs = Array.from(imagesEl.querySelectorAll('img'));
        var masonryWrap = document.createElement('div');
        masonryWrap.style.cssText = 'position: relative; width: 100%;';
        masonryImgs.forEach(function(img) { masonryWrap.appendChild(img); });
        imagesEl.appendChild(masonryWrap);

        function runPageMasonry() {
          var isMob = window.innerWidth <= 700;
          var cols = isMob ? 2 : 3, gap = isMob ? 8 : 10;
          var w = masonryWrap.offsetWidth;
          if (!w) return;
          var colW = (w - gap * (cols - 1)) / cols;
          var tops = new Array(cols).fill(0);
          masonryImgs.forEach(function(img) {
            var col = tops.indexOf(Math.min.apply(null, tops));
            img.style.position = 'absolute';
            img.style.width = colW + 'px';
            img.style.maxWidth = 'none';
            img.style.margin = '0';
            img.style.left = (col * (colW + gap)) + 'px';
            img.style.top = tops[col] + 'px';
            tops[col] += img.offsetHeight + gap;
          });
          masonryWrap.style.height = Math.max.apply(null, tops) + 'px';
        }
        var pageLoaded = 0;
        function onPageImgLoad() { if (++pageLoaded >= masonryImgs.length) runPageMasonry(); }
        masonryImgs.forEach(function(img) {
          if (img.complete && img.naturalHeight > 0) { onPageImgLoad(); }
          else { img.addEventListener('load', onPageImgLoad); img.addEventListener('error', onPageImgLoad); }
        });
        window.addEventListener('resize', function() {
          pageLoaded = masonryImgs.length; runPageMasonry();
        }, { passive: true });
      }

      /* Prev / Next navigation */
      var projectIndex = PROJECTS.findIndex(function(p) { return p.id === id; });
      var prevP = projectIndex > 0 ? PROJECTS[projectIndex - 1] : null;
      var nextP = projectIndex < PROJECTS.length - 1 ? PROJECTS[projectIndex + 1] : null;

      if (prevP) {
        var prevLink = document.getElementById('projPrev');
        prevLink.href = 'project.html?id=' + prevP.id;
        prevLink.classList.remove('hidden');
      }
      if (nextP) {
        var nextLink = document.getElementById('projNext');
        nextLink.href = 'project.html?id=' + nextP.id;
        nextLink.classList.remove('hidden');
      }
    }

    /* ── Lightbox ── */
    var lightbox  = document.getElementById('lightbox');
    var lbImg     = document.getElementById('lightboxImage');
    var lbClose   = document.getElementById('lightboxClose');
    var lbPrev    = document.getElementById('lightboxPrev');
    var lbNext    = document.getElementById('lightboxNext');
    var lbBotPrev = document.getElementById('lightboxBotPrev');
    var lbBotNext = document.getElementById('lightboxBotNext');
    var lbImages  = [];
    var lbIndex   = 0;

    function openLightbox(images, index) { lbImages = images; lbIndex = index; lbImg.src = lbImages[lbIndex].src; lightbox.classList.add('active'); }
    function closeLightbox() { lightbox.classList.remove('active'); lbImg.src = ''; }
    function lbGoNext() { lbIndex = (lbIndex + 1) % lbImages.length; lbImg.src = lbImages[lbIndex].src; }
    function lbGoPrev() { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; lbImg.src = lbImages[lbIndex].src; }

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', lbGoPrev);
    lbNext.addEventListener('click', lbGoNext);
    lbBotPrev.addEventListener('click', lbGoPrev);
    lbBotNext.addEventListener('click', lbGoNext);
    lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });

    var lbTouchX = 0;
    lightbox.addEventListener('touchstart', function(e) { lbTouchX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - lbTouchX;
      if (Math.abs(dx) < 40) return;
      if (dx < 0) lbGoNext(); else lbGoPrev();
    }, { passive: true });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lbGoNext();
      if (e.key === 'ArrowLeft') lbGoPrev();
    });
  </script>

</body>
