<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>seena — art</title>
  <link rel="icon" type="image/png" href="../../img/favicon_new.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Imbue:opsz,wght@10..100,100..900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'TypestarOCR';
      src: url('../../fonts/Typestar-OCR.otf') format('opentype');
      font-display: swap;
    }

    html { scroll-behavior: smooth; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(180deg, #d6c4ff 0%, #220a52 100%);
      background-attachment: fixed;
      color: rgba(240,236,255,.88);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Fixed header */
    .proj-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 28px;
      background: rgba(20, 5, 50, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .proj-meta { flex: 1; padding-right: 28px; min-width: 0; }

    .proj-title-display {
      font-family: 'Imbue', Georgia, serif; font-weight: 600;
      font-size: clamp(16px, 2.2vw, 28px); color: #f0ecff;
      line-height: 1.1; letter-spacing: -.02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .proj-subtitle-display {
      font-family: 'Imbue', Georgia, serif; font-weight: 500;
      font-size: clamp(12px, 1.4vw, 18px); color: rgba(240,236,255,.7);
      line-height: 1.2; margin-top: 2px;
    }
    .proj-info-display {
      font-family: 'TypestarOCR', monospace; font-size: 11px;
      letter-spacing: .06em; color: rgba(240,236,255,.4);
      margin-top: 5px;
    }

    .proj-logo { flex-shrink: 0; }
    .proj-logo a { display: block; }
    .proj-logo img {
      height: 32px; display: block;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.4));
    }

    /* Main body: side-by-side below fixed header */
    .proj-body {
      display: flex; flex-direction: row;
      min-height: 100vh;
      padding-top: 72px;
    }

    /* Images column */
    .proj-images {
      flex: 0 0 52%;
      padding: 28px 24px 40px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .proj-images.proj-images-masonry {
      display: block; columns: 3 160px; column-gap: 10px;
      padding-top: 28px;
    }
    .proj-images img {
      width: 100%; display: block; border-radius: 10px;
      cursor: zoom-in; transition: opacity .2s;
    }
    .proj-images img:hover { opacity: .88; }
    .proj-images.proj-images-masonry img { break-inside: avoid; margin-bottom: 10px; }

    .proj-video { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; margin-bottom: 16px; }

    /* Description column */
    .proj-desc-col {
      flex: 1;
      padding: 28px 40px 40px 28px;
      border-left: 1px solid rgba(255,255,255,.07);
    }

    .proj-desc-text {
      font-size: 15px; line-height: 1.8; color: rgba(240,236,255,.88);
    }
    .proj-desc-text a { color: #c4a0ff; text-decoration: underline; text-underline-offset: 2px; }
    .proj-desc-text a:hover { color: #e0c4ff; }
    .proj-desc-text blockquote {
      border-left: 3px solid rgba(200,160,255,.4);
      margin: 14px 0; padding-left: 14px;
      color: rgba(240,236,255,.65);
    }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background-color: rgba(0,0,0,.95);
      z-index: 2000; opacity: 0; transition: opacity .3s ease;
      align-items: center; justify-content: center;
    }
    .lightbox.active { display: flex; opacity: 1; }
    .lightbox-content {
      position: relative; max-width: 90%; max-height: 90%;
      display: flex; flex-direction: column; align-items: center;
    }
    .lightbox-image { max-width: 100%; max-height: 80vh; object-fit: contain; display: block; }
    .lightbox-hint {
      color: #666; font-family: 'TypestarOCR', monospace; font-size: .7rem;
      letter-spacing: 1px; text-align: center; margin-top: 12px; opacity: .6;
    }
    .lightbox-close {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; color: #fff;
      font-size: 2rem; line-height: 1; cursor: pointer;
      opacity: .25; transition: opacity .3s; padding: 8px; z-index: 2100;
    }
    .lightbox-close:hover { opacity: .85; }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #fff;
      font-size: 3rem; cursor: pointer; opacity: .25;
      transition: opacity .3s; padding: 20px; z-index: 2100;
    }
    .lightbox-nav:hover { opacity: .8; }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-bottom-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.8); padding: 15px; z-index: 2100;
      justify-content: space-between; gap: 10px;
    }
    .lightbox-bottom-prev, .lightbox-bottom-next {
      flex: 1; background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2); color: #fff;
      font-family: 'TypestarOCR', monospace; font-size: 1rem;
      padding: 12px 20px; border-radius: 6px; cursor: pointer; transition: background .3s;
    }
    .lightbox-bottom-prev:hover, .lightbox-bottom-next:hover { background: rgba(157,94,209,.3); }

    /* Not found */
    .proj-not-found {
      padding: 80px 40px; text-align: center;
      font-family: 'TypestarOCR', monospace; color: rgba(240,236,255,.5);
    }

    /* Mobile */
    @media (max-width: 700px) {
      .proj-header { padding: 12px 16px; }
      .proj-logo img { height: 26px; }
      .proj-body { flex-direction: column; padding-top: 64px; }
      .proj-images { flex: none; padding: 16px; }
      .proj-images.proj-images-masonry { columns: 2 120px; }
      .proj-desc-col { padding: 16px 18px 40px; border-left: none; border-top: 1px solid rgba(255,255,255,.07); }
      .lightbox-nav { display: none; }
      .lightbox-bottom-nav { display: flex; }
    }
  </style>
</head>
<body>

  <header class="proj-header">
    <div class="proj-meta">
      <div class="proj-title-display" id="projTitle">seena</div>
      <div class="proj-subtitle-display" id="projSubtitle" style="display:none"></div>
      <div class="proj-info-display" id="projInfo"></div>
    </div>
    <div class="proj-logo">
      <a href="../">
        <img src="../img/seenalogo_graf new purple.png" alt="seena">
      </a>
    </div>
  </header>

  <main class="proj-body" id="projBody">
    <div id="projImages" class="proj-images"></div>
    <div class="proj-desc-col">
      <div class="proj-desc-text" id="projDesc"></div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
    <button class="lightbox-close" id="lightboxClose">&#215;</button>
    <div class="lightbox-content">
      <img class="lightbox-image" id="lightboxImage" src="" alt="">
      <div class="lightbox-hint">&#8592; &#8594; navigate &nbsp;&middot;&nbsp; esc close</div>
      <div class="lightbox-bottom-nav">
        <button class="lightbox-bottom-prev" id="lightboxBotPrev">&#8592; Previous</button>
        <button class="lightbox-bottom-next" id="lightboxBotNext">Next &#8594;</button>
      </div>
    </div>
  </div>

  <script src="../projects.js"></script>
  <script>
    /* ── Load project ── */
    var params  = new URLSearchParams(window.location.search);
    var id      = params.get('id');
    var project = PROJECTS.find(function(p) { return p.id === id; });

    if (!project) {
      document.getElementById('projBody').innerHTML =
        '<div class="proj-not-found">project not found.</div>';
    } else {
      document.title = 'seena — ' + project.title;
      document.getElementById('projTitle').textContent = project.title;

      if (project.subtitle) {
        var subEl = document.getElementById('projSubtitle');
        subEl.textContent = project.subtitle;
        subEl.style.display = '';
      }

      var meta = [project.year, project.medium].filter(Boolean).join(' · ');
      document.getElementById('projInfo').textContent = meta;

      if (project.description) {
        document.getElementById('projDesc').innerHTML = project.description;
      }

      /* Images */
      var imagesEl = document.getElementById('projImages');
      if (project.layout === 'grid') {
        imagesEl.classList.add('proj-images-masonry');
      }

      var lbImages = project.images.map(function(src) { return { src: src, alt: project.title }; });

      if (project.video) {
        var fr = document.createElement('iframe');
        fr.src = project.video;
        fr.className = 'proj-video';
        fr.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        fr.allowFullscreen = true;
        imagesEl.appendChild(fr);
      }

      project.images.forEach(function(src, i) {
        var img = document.createElement('img');
        img.src = src; img.alt = project.title; img.loading = 'lazy';
        img.addEventListener('click', function() { openLightbox(lbImages, i); });
        imagesEl.appendChild(img);
      });
    }

    /* ── Lightbox ── */
    var lightbox  = document.getElementById('lightbox');
    var lbImg     = document.getElementById('lightboxImage');
    var lbClose   = document.getElementById('lightboxClose');
    var lbPrev    = document.getElementById('lightboxPrev');
    var lbNext    = document.getElementById('lightboxNext');
    var lbBotPrev = document.getElementById('lightboxBotPrev');
    var lbBotNext = document.getElementById('lightboxBotNext');
    var lbImages  = [];
    var lbIndex   = 0;

    function openLightbox(images, index) {
      lbImages = images; lbIndex = index;
      lbImg.src = lbImages[lbIndex].src;
      lightbox.classList.add('active');
    }
    function closeLightbox() { lightbox.classList.remove('active'); lbImg.src = ''; }
    function lbGoNext() { lbIndex = (lbIndex + 1) % lbImages.length; lbImg.src = lbImages[lbIndex].src; }
    function lbGoPrev() { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; lbImg.src = lbImages[lbIndex].src; }

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', lbGoPrev);
    lbNext.addEventListener('click', lbGoNext);
    lbBotPrev.addEventListener('click', lbGoPrev);
    lbBotNext.addEventListener('click', lbGoNext);
    lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });

    var lbTouchX = 0;
    lightbox.addEventListener('touchstart', function(e) { lbTouchX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - lbTouchX;
      if (Math.abs(dx) < 40) return;
      if (dx < 0) lbGoNext(); else lbGoPrev();
    }, { passive: true });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lbGoNext();
      if (e.key === 'ArrowLeft') lbGoPrev();
    });
  </script>

</body>
</html>
