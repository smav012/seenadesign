<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hi im seena</title>
    <link rel="icon" type="image/png" href="img/favicon_new.png">
    <style>
        @font-face {
            font-family: 'TypestarOCR';
            src: url('fonts/Typestar-OCR.otf') format('opentype');
            font-display: swap;
        }
        @font-face {
            font-family: 'TypestarNormal';
            src: url('fonts/Typestar-Normal.otf') format('opentype');
            font-display: swap;
        }
        @font-face {
            font-family: 'AvenirNext';
            src: url('fonts/Avenir Next.ttc') format('truetype');
            font-display: swap;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #0f0f14;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px 16px 80px;
            position: relative;
            overflow-x: hidden;
        }

        /* ── Ambient blob background ── */
        .bg-blobs {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.85;
        }

        .blob-1 {
            width: 55vw;
            height: 55vw;
            background: rgba(147, 51, 234, 0.35);
            top: -10%;
            left: -15%;
            animation: drift-1 16s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 45vw;
            height: 45vw;
            background: rgba(251, 146, 60, 0.3);
            top: 30%;
            right: -10%;
            animation: drift-2 19s ease-in-out infinite alternate;
        }
        .blob-3 {
            width: 40vw;
            height: 40vw;
            background: rgba(125, 211, 252, 0.28);
            bottom: -5%;
            left: 20%;
            animation: drift-3 14s ease-in-out infinite alternate;
        }
        .blob-4 {
            width: 30vw;
            height: 30vw;
            background: rgba(192, 38, 211, 0.2);
            top: 55%;
            left: -5%;
            animation: drift-4 21s ease-in-out infinite alternate;
        }

        @keyframes drift-1 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(8vw, 6vh) scale(1.1); }
        }
        @keyframes drift-2 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-6vw, -8vh) scale(0.95); }
        }
        @keyframes drift-3 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(5vw, -5vh) scale(1.08); }
        }
        @keyframes drift-4 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(7vw, 4vh) scale(1.05); }
        }

        /* ── Card wrapper ── */
        .card-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* ── Card ── */
        .links-card {
            background: #f8f9e7;
            border: 8.5px solid #1ab311;
            border-radius: 52px;
            padding: 22px;
            width: 100%;
            max-width: 374px;
            text-align: center;
        }

        /* ── Header ── */
        .card-header {
            font-family: 'TypestarOCR', 'Courier New', monospace;
            font-size: 30px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.85);
            margin-bottom: 14px;
            letter-spacing: -0.01em;
        }

        /* ── Collage image ── */
        .collage-img {
            width: 100%;
            border-radius: 8px;
            display: block;
            margin-bottom: 14px;
        }

        /* ── Nav links ── */
        .nav-links {
            list-style: none;
            margin: 4px 0 12px;
        }

        .nav-links hr {
            border: none;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            margin: 8.7px 0;
        }

        .nav-link-item a {
            display: block;
            font-family: 'AvenirNext', 'Helvetica Neue', Arial, sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.85);
            letter-spacing: -0.01em;
            text-decoration: none;
            padding: 2px 0;
            transition: opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-link-item a:hover { opacity: 0.6; }

        .link-icon { margin-right: 8px; }

        /* ── Bird section ── */
        .bird-section {
            margin: 10px 0 4px;
        }

        .bird-label {
            font-family: 'TypestarNormal', 'Helvetica Neue', sans-serif;
            font-size: 17px;
            font-weight: 700;
            font-style: italic;
            color: rgb(25, 82, 139);
            display: block;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .bird-links {
            font-family: 'TypestarNormal', 'Helvetica Neue', sans-serif;
            font-size: 21px;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.85);
        }

        .bird-links a {
            color: rgba(0, 0, 0, 0.85);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .bird-links a:hover { text-decoration: underline; }

        .cloud-icon {
            color: rgb(61, 218, 21);
            margin: 0 4px;
        }

        /* ── Social row ── */
        .social-hr {
            border: none;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            margin: 10px 0;
        }

        .social-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
        }

        .social-row a {
            color: rgba(0, 0, 0, 0.85);
            text-decoration: none;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .social-row a:hover { opacity: 0.6; }

        .social-row svg {
            width: 29px;
            height: 29px;
            fill: rgba(0, 0, 0, 0.85);
        }

        /* ── Desktop ── */
        @media (min-width: 600px) {
            body { padding: 37px 47px 91px; }
        }
    </style>
</head>

</body>
</html>
